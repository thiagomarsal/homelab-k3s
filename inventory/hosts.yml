---
all:
  children:
    servers:
      hosts:
        k3s-master-1:
          ansible_host: 192.168.1.50
          k3s_role: server
          k3s_init: true  # First node bootstraps the cluster
        k3s-master-2:
          ansible_host: 192.168.1.51
          k3s_role: server
        k3s-master-3:
          ansible_host: 192.168.1.52
          k3s_role: server
    agents:
      hosts:
        k3s-worker-1:
          ansible_host: 192.168.1.53
          k3s_role: agent
          k3s_node_labels:
            - "node-role.kubernetes.io/worker=true"
            - "workload-type=on-demand"
          k3s_node_taints:
            - "on-demand=true:NoSchedule"
